<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Акт ремонту кавоварок</title>
<link rel="manifest" href="manifest.json">
<style>
body { font-family: Arial; background:#eee; padding:20px; }
.card { background:#fff; padding:15px; border-radius:10px; }
select, button { width:100%; padding:10px; margin:10px 0; }
.item { display:flex; justify-content:space-between; }
.total { font-weight:bold; }

input, select, button {
  width: 100%;
  box-sizing: border-box;
  height: 52px;
  font-size: 16px;
  border-radius: 10px;
  padding: 12px;
}

select {
  appearance: none;
  -webkit-appearance: none;
  background-color: white;
}

button {
  background: #f0f0f0;
  border: 1px solid #ccc;
}

</head>
<body>

<div class="card">
<h2>☕ Акт ремонту кавоварок</h2>

<input id="model" placeholder="Модель кавоварки" style="width:100%;padding:10px;">
<input id="sn" placeholder="Індивідуальний номер" style="width:100%;padding:10px;">

<div id="machineInfo" style="padding:10px;background:#f5f5f5;margin-top:10px;"></div>

<select id="service"></select>

<input id="qty" type="number" min="1" value="1" style="width:100%;padding:10px;font-size:16px;">

<button onclick="addService()">➕ Додати</button>

<input id="serviceCodes" placeholder="Коди послуг">
<button onclick="addCodes()">Додати коди</button>

<button onclick="clearAct()">🗑 Очистити акт</button>

<button onclick="saveAct()">💾 Зберегти акт</button>

<table id="list" style="width:100%;border-collapse:collapse;margin-top:15px;">
  <thead>
    <tr style="background:#f0f0f0;">
      <th style="border:1px solid #ccc;padding:6px;">№</th>
      <th style="border:1px solid #ccc;padding:6px;">Послуга</th>
      <th style="border:1px solid #ccc;padding:6px;">К-сть</th>
      <th style="border:1px solid #ccc;padding:6px;">Сума</th>
      <th style="border:1px solid #ccc;padding:6px;">✖</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<p class="total">Сума: <span id="sum">0</span> грн</p>
<p>Ти (49%): <span id="me">0</span> грн</p>
<p>Компанія (51%): <span id="company">0</span> грн</p>
<p style="font-weight:bold;color:green;">
Мій заробіток за місяць: <span id="monthTotal">0</span> 
</p>
<button onclick="resetMonth()" style="background:#c00;color:white;">
🔄 Обнулити мій заробіток
</button>



<hr>
<h3>💵 Виплати</h3>

<input id="payAmount" type="number" placeholder="Сума виплати">

<button onclick="addPayment()">➕ Додати виплату</button>

<p><b>Залишок:</b> <span id="balance">0</span> грн</p>

<button onclick="resetPayments()" style="background:#555;color:white;">
🔄 Обнулити виплати
</button>

<div id="paymentsHistory" style="margin-top:10px;background:#f5f5f5;padding:10px;"></div>

<select id="machineSelect"> </select>

<input id="searchSN" placeholder="🔍 Серійний номер" style="width:100%;padding:10px;">
<button onclick="searchMachine()">Знайти</button>

<button onclick="deleteMachine()" style="background:#b00000;color:white;">
🗑 Видалити цю кавоварку
</button>

</div>

<script>

function deleteMachine(){
  var sn = document.getElementById("searchSN").value.trim();
  if(!sn) return alert("Введіть серійний номер");

  var m = machines.find(x => x.id === sn);
  if(!m) return alert("Кавоварку не знайдено");

  if(!confirm("Видалити кавоварку "+m.model+" ("+sn+") та всю її історію?")) return;

  machines = machines.filter(x => x.id !== sn);
  saved = saved.filter(a => a.machine !== sn);

  localStorage.setItem("machines", JSON.stringify(machines));
  localStorage.setItem("acts", JSON.stringify(saved));

  document.getElementById("machineHistory").innerHTML = "";
  document.getElementById("searchSN").value = "";

  alert("Кавоварку видалено");
}

function resetMonth(){
  if(!confirm("Обнулити тільки заробіток за місяць?")) return;

  myMonth = 0;
  localStorage.setItem("myMonth", "0");
  updateMonthTotal();

  alert("Місячний заробіток обнулено. Історія ремонтів збережена.");
}

let month = new Date().getMonth(); // поточний місяць

let saved = JSON.parse(localStorage.getItem("acts") || "[]");

let myMonth = Number(localStorage.getItem("myMonth") || 0);

let machines = JSON.parse(localStorage.getItem("machines") || "[]");

function saveMachine(){
  const model = document.getElementById("model").value.trim();
  const sn = document.getElementById("sn").value.trim();
  if(!model || !sn) return alert("Введи модель і номер");

  let existing = machines.find(m => m.id === sn);
  if(existing){
    existing.model = model;
  } else {
    machines.push({id:sn, model:model, lastRepair:""});
  }

  localStorage.setItem("machines", JSON.stringify(machines));
  updateMachineSelect();
  alert("Кавоварку збережено");
}

function updateMachineSelect(){
  const sel = document.getElementById("machineSelect");
  sel.innerHTML = "<option value=''>Оберіть кавоварку</option>";
  machines.forEach(m=>{
    let o = document.createElement("option");
    o.value = m.id;
    o.textContent = m.model + " (" + m.id + ")" + (m.lastRepair ? " | останній: "+m.lastRepair : "");
    sel.appendChild(o);
  });
}
updateMachineSelect();

function saveAct(){
  if(total === 0) return alert("Акт порожній");

  var model = document.getElementById("model").value.trim();
  var sn = document.getElementById("sn").value.trim();

  if(!model || !sn){
    return alert("Введіть модель і серійний номер кавоварки");
  }

  var today = new Date().toISOString().split("T")[0];
  var myPart = Math.round(total * 0.49);

  myMonth += myPart;
  localStorage.setItem("myMonth", myMonth);
  // знайти або створити кавоварку
  var m = machines.find(function(x){ return x.id === sn; });

  if(!m){
    m = { id: sn, model: model, lastRepair: "" };
    machines.push(m);
  } else {
    m.model = model; // якщо модель змінилась — оновлюємо
  }

  // оновлюємо дату останнього ремонту
  m.lastRepair = today;

  // додаємо акт
  saved.push({
    date: today,
    my: myPart,
    machine: sn
  });

  localStorage.setItem("machines", JSON.stringify(machines));
  localStorage.setItem("acts", JSON.stringify(saved));

  // оновити історію якщо ця кавоварка відкрита
  document.getElementById("searchSN").value = sn;
  searchMachine();

  updateMonthTotal();
  alert("Акт додано до історії кавоварки");
// 🔥 автоочистка після збереження
currentAct = [];
total = 0;

renderTable();

document.getElementById("qty").value = 1;
document.getElementById("model").value = "";
document.getElementById("sn").value = "";
select.selectedIndex = 0;
updateBalance();

}
function updateMonthTotal(){
  document.getElementById("monthTotal").innerText = myMonth + " грн";
  
}

// при старті
updateMonthTotal();

let total = 0;
let currentAct = [];
const select = document.getElementById("service");

select.innerHTML = "<option value='0'>Оберіть послугу</option>";
services.forEach(s=>{
  const opt = document.createElement("option");
  opt.value = s.price;
  opt.textContent = s.code + " | " + s.name + " — " + s.price + " грн";
  select.appendChild(opt);

});

function addService(){
  const price = Number(select.value);
  const qty = Number(document.getElementById("qty").value);

  if(price === 0 || qty <= 0) return;

  const name = select.options[select.selectedIndex].text.split(" — ")[0];

  currentAct.push({
    name: name,
    price: price,
    qty: qty
  });

  renderTable();
}

function renderTable(){
  const tbody = document.querySelector("#list tbody");
  tbody.innerHTML = "";
  total = 0;

  currentAct.forEach((item, index) => {
    const row = document.createElement("tr");

    const sum = item.price * item.qty;
    total += sum;

    row.innerHTML =` 
 <td style="border:1px solid #ccc;padding:6px;text-align:center;">${index+1}</td>
      <td style="border:1px solid #ccc;padding:6px;">${item.name}</td>
      <td style="border:1px solid #ccc;padding:6px;">
        <input type="number" min="1" value="${item.qty}" 
          onchange="changeQty(${index}, this.value)" 
          style="width:60px;">
      </td>
      <td style="border:1px solid #ccc;padding:6px;text-align:right;">
        ${sum} грн
      </td>
      <td style="border:1px solid #ccc;padding:6px;text-align:center;">
        <button onclick="removeItem(${index})">❌</button>
      </td>
    `;
    tbody.appendChild(row);
  });

  update();
}

function changeQty(index, value){
  currentAct[index].qty = Number(value);
  renderTable();
}

function removeItem(index){
  currentAct.splice(index,1);
  renderTable();
}

function update(){
  document.getElementById("sum").textContent = total;
  document.getElementById("me").textContent = Math.round(total*0.49);
  document.getElementById("company").textContent = Math.round(total*0.51);
}

function clearAct(){
  if(!confirm("Очистити акт?")) return;

  currentAct = [];
  total = 0;
  renderTable();
}

if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js");
}
  
function searchMachine(){
  try {
    var sn = document.getElementById("searchSN").value.trim();
    if(!sn){
      document.getElementById("machineInfo").innerHTML = "";
      document.getElementById("machineHistory").innerHTML = "";
      return;
    }

    var m = machines.find(function(x){
      return x.id === sn;
    });

    if(!m){
      document.getElementById("machineHistory").innerHTML = "❌ Кавоварку не знайдено";
      return;
    }

    var history = saved.filter(function(a){
      return a.machine === sn;
    });

    var html = "";
    html += "<b>Модель:</b> " + m.model + "<br>";
    html += "<b>Серійний №:</b> " + m.id + "<br>";
    html += "<b>Останній ремонт:</b> " + (m.lastRepair || "—") + "<br>";
    html += "<hr>";
    html += "<b>Історія ремонтів:</b><br>";

    if(history.length === 0){
      html += "Немає записів";
    } else {
     history.forEach(function(a, i){

   html +=` 
<div style="display:flex;justify-content:space-between;align-items:center;">
<span>📅 ${a.date} — 💰 ${a.my} грн</span>
<button onclick="deleteRepair('${sn}', ${i})"style="font-size:12px;padding:2px 6px;">❌</button>
</div>
`;

});
    }

    document.getElementById("machineHistory").innerHTML = html;

  } catch(e){
    alert("Помилка пошуку: " + e.message);
  }
}

// ===== ВИПЛАТИ =====

let payments = JSON.parse(localStorage.getItem("payments") || "[]");

function updateBalance(){

  const balanceEl = document.getElementById("balance");

  if(!balanceEl) return;

  let totalPaid = payments.reduce((sum,p)=>sum + p.amount, 0);

  let balance = myMonth - totalPaid;

  if(balance < 0) balance = 0;

  balanceEl.innerText = balance;
}

function renderPayments(){

  const div = document.getElementById("paymentsHistory");
  if(!div) return;

  if(payments.length === 0){
    div.innerHTML = "Немає виплат";
    return;
  }

  let html = `
  <table style="width:100%;border-collapse:collapse;">
    <tr style="background:#ddd;">
      <th>№</th>
      <th>Дата</th>
      <th>Сума</th>
      <th>Видалити</th>
    </tr>
  `;

  payments.forEach((p,i)=>{
    html += `
    <tr style="border-bottom:1px solid #ccc;">
      <td>${i+1}</td>
      <td>${p.date}</td>
      <td>${p.amount} грн</td>
      <td>
        <button onclick="deletePayment(${i})">
        ❌
        </button>
      </td>
    </tr>
    `;
  });

  html += "</table>";

  div.innerHTML = html;
}

function addPayment(){
  let amount = Number(document.getElementById("payAmount").value);
  if(amount <= 0) return alert("Введи суму");

  let today = new Date().toISOString().split("T")[0];

  payments.push({
    date: today,
    amount: amount
  });

  localStorage.setItem("payments", JSON.stringify(payments));

  document.getElementById("payAmount").value = "";

  renderPayments();
  updateBalance();
}

function resetPayments(){
  if(!confirm("Обнулити тільки виплати?")) return;

  payments = [];
  localStorage.setItem("payments", "[]");

  renderPayments();
  updateBalance();
}

// оновлюємо після старту
renderPayments();
updateBalance();

/* ===== ВИПЛАТИ (безпечний блок) ===== */

(function(){

let payments = JSON.parse(localStorage.getItem("payments") || "[]");

function getBalance(){
  let totalPaid = payments.reduce((s,p)=>s+p.amount,0);
  let balance = myMonth - totalPaid;
  if(balance < 0) balance = 0;
  return balance;
}

function updateBalance(){
  const el = document.getElementById("balance");
  if(!el) return;
  el.innerText = getBalance();
}


window.addPayment = function(){

  let input = document.getElementById("payAmount");
  if(!input) return;

  let amount = Number(input.value);

  if(amount <= 0){
    alert("Введи суму");
    return;
  }

  let today = new Date().toISOString().split("T")[0];

  payments.push({
    date: today,
    amount: amount
  });

  localStorage.setItem("payments", JSON.stringify(payments));

  input.value = "";

  renderPayments();
  updateBalance();
}

window.resetPayments = function(){

  if(!confirm("Обнулити виплати?")) return;

  payments = [];

  localStorage.setItem("payments","[]");

  renderPayments();
  updateBalance();
}

renderPayments();
updateBalance();

})();

window.deletePayment = function(i){

  if(!confirm("Видалити виплату?")) return;

  payments.splice(i,1);

  localStorage.setItem("payments", JSON.stringify(payments));

  renderPayments();
  updateBalance();
}

function addByCode(){

let code = Number(document.getElementById("serviceCode").value);

if(!code) return;

let service = services.find(s => s.code === code);

if(!service){
  alert("Код не знайдено");
  return;
}

currentAct.push({
  name: service.name,
  price: service.price,
  qty: 1
});

renderTable();

document.getElementById("serviceCode").value = "";

}

function addCodes(){

let input = document.getElementById("serviceCodes").value;

if(!input) return;

let codes = input.split(/[\s,]+/); // розділяє по пробілу або комі

codes.forEach(c => {

let code = Number(c);

let service = services.find(s => s.code === code);

if(service){

currentAct.push({
name: service.name,
price: service.price,
qty: 1
});

}

});

renderTable();

document.getElementById("serviceCodes").value = "";

}

function deleteRepair(sn, index){

if(!confirm("Видалити цей ремонт?")) return;

let acts = JSON.parse(localStorage.getItem("acts") || "[]");

let machineActs = acts.filter(a => a.machine === sn);

let actToDelete = machineActs[index];

acts = acts.filter(a => !(a.machine === sn && a.date === actToDelete.date && a.my === actToDelete.my));

localStorage.setItem("acts", JSON.stringify(acts));

saved = acts;

searchMachine();

}

renderPayments();
updateBalance();

</script>
